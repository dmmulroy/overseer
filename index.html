<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PROTOTYPE — issue detail steering in Overseer's shadcn/Base UI foundation" />
    <script>
      (() => {
        const urlMode = new URL(window.location.href).searchParams.get("mode");
        const storedMode = localStorage.getItem("overseer-theme");
        const mode = ["light", "dark", "system"].includes(urlMode) ? urlMode : storedMode ?? "system";
        const dark = mode === "dark" || (mode === "system" && matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.classList.toggle("dark", dark);
        document.documentElement.style.colorScheme = dark ? "dark" : "light";
      })();
    </script>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%2318202a'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='sans-serif' font-size='18' fill='white'%3EO%3C/text%3E%3C/svg%3E" />
    <title>Overseer · Issue detail steering prototype</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
